<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NIGGERPISS.STORE</title>

  <style>
    body {
      background-color: #00FFFF;
      font-family: "Comic Sans MS", cursive, sans-serif;
      color: #FF00FF;
      text-align: center;
      margin: 0;
    }

    header {
      background: linear-gradient(90deg, red, yellow, lime);
      padding: 20px;
      border-bottom: 5px dashed purple;
    }

    header img {
      width: 400px;
      image-rendering: pixelated;
    }

    .marquee {
      background-color: black;
      color: lime;
      padding: 5px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .video-link {
      display: block;
      background-color: yellow;
      color: blue;
      border: 3px solid red;
      margin: 10px auto;
      padding: 10px;
      width: 60%;
      text-decoration: none;
      font-size: 18px;
    }

    .video-link:hover {
      background-color: red;
      color: white;
    }

    footer {
      margin-top: 30px;
      padding: 10px;
      background-color: purple;
      color: white;
      font-size: 12px;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    button {
      margin-top: 20px;
      padding: 10px;
      background-color: orange;
      border: 2px solid black;
      cursor: pointer;
      font-weight: bold;
    }

    /* BLUR SYSTEM */
    .content {
      filter: blur(8px);
      transition: filter 1s ease;
    }

    body.loaded .content {
      filter: none;
    }

    /* OVERLAY */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #enterBox {
      background: yellow;
      padding: 30px;
      border: 5px dashed red;
    }
  </style>
</head>

<body>

  <!-- OVERLAY (on top, not blurred) -->
  <div id="overlay">
    <div id="enterBox">
      <h1 class="blink">🔊 ENTER SITE 🔊</h1>
      <button onclick="enterSite()">CLICK TO ENTER</button>
    </div>
  </div>

  <!-- MUSIC -->
  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <!-- BLURRED CONTENT -->
  <div class="content">

    <header>
      <img src="wordart.png" alt="My Cool Site Title">
    </header>

    <div class="marquee">
      <marquee>HELLO FAGIGGERS... WELCOME TO NIGGERPISS.STORE</marquee>
    </div>

    <div class="container">
      <h2 class="blink">🔥 VIDEOS 🔥</h2>

      <a class="video-link" href="https://www.youtube.com/watch?v=RYrh39oCqM0" target="_blank">
        1 😎
      </a>

      <a class="video-link" href="https://www.youtube.com/watch?v=yHMUB4bzI84" target="_blank">
        2 🤯
      </a>

      <a class="video-link" href="https://www.youtube.com/watch?v=LRZu8fvzhD8" target="_blank">
        WHOA NIGGAAA
      </a>
    </div>

    <footer>
      <p>© 2026 NIGGERPISS.STORE</p>
    </footer>

  </div>

  <!-- SCRIPT -->
  <script>
    function enterSite() {
      const overlay = document.getElementById('overlay');
      const music = document.getElementById('bgMusic');

      music.play().catch(() => {}); // prevents errors if blocked

      overlay.classList.add('hidden');
      document.body.classList.add('loaded');
    }
  </script>

</body>
</html>
